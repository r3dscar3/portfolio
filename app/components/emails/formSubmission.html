<div style="background-color: #f0f0f0; padding: 32px 16px; width: 100%; box-sizing: border-box">
  <table
    role="presentation"
    cellpadding="0"
    cellspacing="0"
    style="max-width: 600px; margin: 0 auto; width: 100%"
  >
    <tr>
      <td
        style="
          background-color: #ffffff;
          border-radius: 12px;
          padding: 32px;
          font-family: 'Courier New', Courier, monospace;
        "
      >
        <!-- Logo -->
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
          <tr>
            <td align="center" style="padding-bottom: 24px">
              <img
                src="https://nolanpanther.com/media/glasses.png"
                alt="Nolan Panther Logo"
                width="150"
                style="display: block; width: 150px; height: auto"
              />
            </td>
          </tr>
        </table>

        <!-- Title -->
        <h1
          style="
            margin: 0 0 24px 0;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: #111111;
            font-family: 'Courier New', Courier, monospace;
          "
        >
          Form Submission
        </h1>

        <!-- Divider -->
        <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 0 0 24px 0" />

        <!-- Sender Info -->
        <table
          role="presentation"
          cellpadding="0"
          cellspacing="0"
          width="100%"
          style="margin-bottom: 24px"
        >
          <tr>
            <td
              width="80"
              style="
                padding: 4px 0;
                font-size: 14px;
                color: #555555;
                font-family: 'Courier New', Courier, monospace;
              "
            >
              <strong style="color: #111111">Name</strong>
            </td>
            <td
              style="
                padding: 4px 0;
                font-size: 14px;
                color: #333333;
                font-family: 'Courier New', Courier, monospace;
              "
            >
              {{name}}
            </td>
          </tr>
          {{email && `
          <tr>
            <td
              width="80"
              style="
                padding: 4px 0;
                font-size: 14px;
                color: #555555;
                font-family: 'Courier New', Courier, monospace;
              "
            >
              <strong style="color: #111111">Email</strong>
            </td>
            <td
              style="
                padding: 4px 0;
                font-size: 14px;
                font-family: 'Courier New', Courier, monospace;
              "
            >
              <a href="mailto:${email}" style="color: #0066cc; text-decoration: none">{{email}}</a>
            </td>
          </tr>
          `}} {{phone && `
          <tr>
            <td
              width="80"
              style="
                padding: 4px 0;
                font-size: 14px;
                color: #555555;
                font-family: 'Courier New', Courier, monospace;
              "
            >
              <strong style="color: #111111">Phone</strong>
            </td>
            <td
              style="
                padding: 4px 0;
                font-size: 14px;
                color: #333333;
                font-family: 'Courier New', Courier, monospace;
              "
            >
              {{phone}}
            </td>
          </tr>
          `}}
        </table>

        <!-- Divider -->
        <hr style="border: none; border-top: 1px solid #e0e0e0; margin: 0 0 24px 0" />

        <!-- Message Body -->
        <p
          style="
            margin: 0;
            font-size: 15px;
            line-height: 1.7;
            color: #333333;
            font-family: 'Courier New', Courier, monospace;
          "
        >
          {{body}}
        </p>
      </td>
    </tr>
  </table>
</div>
